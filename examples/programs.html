  <h2>2. Scanner Input</h2>
  <script type="text/x-java">
import java.util.Scanner;

public class Greeting {
    public static void main(String[] args) {
        Scanner scan = new Scanner(System.in);
        System.out.print("What is your name? ");
        String name = scan.nextLine();
        System.out.println("Hello, " + name + "!");
    }
}
  </script>

  <h2>3. Temperature Converter</h2>
  <script type="text/x-java">
import java.util.Scanner;

public class Convert {
    public static void main(String[] args) {
        Scanner scan = new Scanner(System.in);
        System.out.print("Enter temperature in Fahrenheit: ");
        double fahrenheit = scan.nextDouble();
        double celsius = (fahrenheit - 32) * 5.0 / 9.0;
        System.out.printf("%.1f°F = %.1f°C%n", fahrenheit, celsius);
    }
}
  </script>

  <h2>4. Loops &amp; Arrays</h2>
  <script type="text/x-java">
public class FizzBuzz {
    public static void main(String[] args) {
        for (int i = 1; i <= 30; i++) {
            if (i % 15 == 0) {
                System.out.println("FizzBuzz");
            } else if (i % 3 == 0) {
                System.out.println("Fizz");
            } else if (i % 5 == 0) {
                System.out.println("Buzz");
            } else {
                System.out.println(i);
            }
        }
    }
}
  </script>

  <h2>5. ArrayList &amp; Collections</h2>
  <script type="text/x-java">
import java.util.ArrayList;
import java.util.Collections;

public class ListDemo {
    public static void main(String[] args) {
        ArrayList<String> names = new ArrayList<>();
        names.add("Charlie");
        names.add("Alice");
        names.add("Bob");

        System.out.println("Before sort: " + names);
        Collections.sort(names);
        System.out.println("After sort:  " + names);
        System.out.println("Size: " + names.size());
        System.out.println("Contains Alice? " + names.contains("Alice"));
    }
}
  </script>

  <h2>6. Inheritance &amp; Polymorphism</h2>
  <script type="text/x-java">
public class Animal {
    private String name;

    public Animal(String name) {
        this.name = name;
    }

    public String speak() {
        return "...";
    }

    public String toString() {
        return name + " says " + speak();
    }
}

public class Dog extends Animal {

    public Dog(String name) {
        super(name);
    }

    public String speak() {
        return "Woof!";
    }
}

public class Cat extends Animal {

    public Cat(String name) {
        super(name);
    }

    public String speak() {
        return "Meow!";
    }
}

public class Main {
    public static void main(String[] args) {
        Animal[] animals = {
            new Dog("Rex"),
            new Cat("Whiskers"),
            new Dog("Buddy"),
        };
        for (Animal a : animals) {
            System.out.println(a);
        }
    }
}
  </script>

  <h2>7. Exception Handling</h2>
  <script type="text/x-java">
public class ExceptionDemo {
    public static void main(String[] args) {
        try {
            int[] arr = {1, 2, 3};
            System.out.println("Element at 5: " + arr[5]);
        } catch (ArrayIndexOutOfBoundsException e) {
            System.out.println("Caught: " + e.getMessage());
        }

        try {
            String s = null;
            System.out.println(s.length());
        } catch (NullPointerException e) {
            System.out.println("Caught: " + e.getMessage());
        }

        System.out.println("Program continues after exceptions.");
    }
}
  </script>

  <h2>8. Methods &amp; Recursion</h2>
  <script type="text/x-java">
public class Fibonacci {
    public static int fib(int n) {
        if (n <= 1) return n;
        return fib(n - 1) + fib(n - 2);
    }

    public static void main(String[] args) {
        for (int i = 0; i <= 15; i++) {
            System.out.print(fib(i) + " ");
        }
        System.out.println();
    }
}
  </script>
